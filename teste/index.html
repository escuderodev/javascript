<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div>
        <form class="form_container">
            <h1>Cadastro de Aluno</h1>
            <div class="form_header">
                <label for="name">Nome:</label>
                <input type="text" name="name" id="name" placeholder="Nome Completo" required>
            </div>
            <div class="form_body">
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="idade" placeholder="Idade" required>
                <p>Sexo:</p>

            <div class="footer">
                <label for="masculino">Masculino:</label>
                <input type="radio" name="sexo" id="masculino">
                <label for="feminino">Feminino:</label>
                <input type="radio" name="sexo" id="feminino" placeholder="Feminino">
            </div>
            
            <div class="btn_enviar">
                <button type="submit">Enviar</button>
            </div>

        </form>
    </div>
    
</body>
</html>
