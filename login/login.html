<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./login.css">
    <title>Tela de Login</title>
</head>
<body>
    <div class="fundo">
        <h1 class="creditos">Desenvolvido por <a href="https://escuderodev.com.br/" target="_blank" class="link">EscuderoDEV</a></h1>
        <div class="login">
            <h1>Login</h1>
            <form class="formulario">
                <input type="text" name="user" id="user" placeholder="Usuário" required>
                <input type="password" name="pass" id="pass" placeholder="Senha" required>
                <button type="submit" id="botao" onclick="validaDados(); return false">Entrar</button>
            </form>
        </div>
    </div>
    <script src="./login.js"></script>
</body>
</html>
