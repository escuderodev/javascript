<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>ByteBank</title>
</head>
<body>
    <header class="header_container">
        <h1>ByteBank</h1>
        <p>Tela de Saque</p>
        <form class="form_container" id="form">
            <input type="number" name="agencia" id="agencia" placeholder="Agência" required>
            <input type="number" name="numero" id="numero" placeholder="Número da Conta" required>
            <input type="number" name="valor_desejado" id="valor_desejado" placeholder="Valor Desejado">
            <button type="submit" id="btn_sacar">Sacar</button>
            <p id="resultado">Valor sacado R$: 100.00</p>
        </form>
    </header>
    <script src="./main.js"></script>
</body>
</html>
